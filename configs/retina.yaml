project:
  name: Retina
  subtitle: Visual intelligence search engine for image-text retrieval, semantic recommendations, CLIP embeddings, FAISS indexing, evaluation, and local serving.

dataset:
  name: flickr8k
  input_manifest: data/raw/captions.csv
  output_dir: data/processed
  sample_limit: null
  seed: 42
  split_ratios: [0.8, 0.1, 0.1]

model:
  name: openai/clip-vit-base-patch32
  batch_size: 16
  device: auto

artifacts:
  image_dir: data/artifacts/images
  embeddings_dir: data/processed/embeddings
  index_path: data/processed/index/retina_image_index.faiss
  index_meta_path: data/processed/index/retina_image_index.json
  metadata_path: data/processed/retina_metadata.jsonl
  query_adapter_path: models/retina_query_adapter.pt
  reports_dir: reports

server:
  host: 127.0.0.1
  port: 8000
  cors_origins:
    - http://localhost:5173
    - http://127.0.0.1:5174

search:
  top_k: 10

setup:
  command: make all-local

training:
  batch_size: 128
  epochs: 6
  hidden_dim: 1024
  learning_rate: 0.001
  weight_decay: 0.01
  temperature: 0.07
  dropout: 0.1
  device: auto
  seed: 42
